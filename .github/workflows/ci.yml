# =============================================================================
# CI — activia-trace
#
# Trigger: push / pull_request on main
# Jobs (parallel):
#   backend-lint   — ruff static analysis
#   backend-test   — pytest with PostgreSQL service container
#   frontend-lint  — eslint (stub until eslint config is in place)
#   frontend-build — Vite production build
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Backend lint ────────────────────────────────────────────────────────────
jobs:
  backend-lint:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install linting tools
        run: pip install ruff==0.9.0

      - name: Run ruff check
        run: ruff check backend/

  # ── Backend tests ─────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    # PostgreSQL service container for integration tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: activia
          POSTGRES_PASSWORD: activia
          POSTGRES_DB: activia_trace
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run pytest
        run: pytest backend/tests/ -v --cov=backend/app --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://activia:activia@localhost:5432/activia_trace
          SECRET_KEY: test-secret-key-for-ci-32chars!!
          ENCRYPTION_KEY: test-encryption-key-32chars!
          ENVIRONMENT: test

  # ── Frontend lint (stub) ──────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint placeholder
        run: echo "eslint not yet configured — pending ESLint config setup"

  # ── Frontend build ────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend
