server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ──────────────────────────────────────────────────────
    # All routes that don't match a file or directory serve index.html
    # so the React router can handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively, HTML never
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API proxy ──────────────────────────────────────────────────────────
    # Forward /api requests to the backend container (service name in
    # docker-compose is "app"). In development the Vite dev server proxies
    # via vite.config.ts instead.
    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
